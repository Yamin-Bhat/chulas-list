<!DOCTYPE html>
<html>
<head>
    <title>{{ chula.name }} - Family Details</title>
</head>
<body>
    <h2>Chula Name: {{ chula.name }}</h2>

    <p><strong>Chula Head:</strong> {{ chula.head or "Not specified" }}</p>

    <h3>Family Members:</h3>
    <ul>
        {% for member in chula.members.split(',') %}
            <li>{{ member.strip() }}</li>
        {% endfor %}
    </ul>

    <br>
    <a href="{{ url_for('home') }}">← Back to Chula List</a>
</body>
</html>
