<!DOCTYPE html>
<html>
<head>
    <title>{{ chula.name }} - Family Details</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>{{ chula.name }}</h1>
    
    <h3>Family Members:</h3>
    <ul>
        {% for member in chula.members.split(',') %}
            <li>{{ member.strip() }}</li>
        {% endfor %}
    </ul>

    <br>
    <a href="{{ url_for('home') }}">← Back to Chula List</a>
</body>
</html>
