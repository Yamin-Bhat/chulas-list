<!DOCTYPE html>
<html>
<head>
    <title>Poshpora Chulas</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>Chulas of Poshpora</h1>
    {% if is_admin %}
        <p><a href="/logout">Logout</a></p>

        <h2>Add New Chula</h2>
        <form id="chulaForm">
            <input type="text" id="name" placeholder="Chula Name" required>
            <input type="text" id="head" placeholder="Chula Head">
            <input type="text" id="members" placeholder="Members (comma separated)" required>
            <button type="submit">Add Chula</button>
        </form>
    {% else %}
        <p style="color:red;">You must <a href="/login">log in</a> to add chulas.</p>
    {% endif %}
<hr>
<h2> All Chulas </h2>
    <div id="chula-list"></div>

    
        <script>
     function loadChulas() {
        fetch('/api/chulas')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('chula-list');
                container.innerHTML = '';  // Clear before reloading

                data.forEach(chula => {
                    const div = document.createElement('div');
                    div.innerHTML = `<h3>${chula.name}</h3>
                                     <p><strong>Head:</strong> ${chula.head || 'N/A'}</p>
                                     <p><strong>Members:</strong> ${chula.members.join(', ')}</p>`;
                    container.appendChild(div);
                });
            });
    }

    // Handle form submit
    const form = document.getElementById('chulaForm');
        if (form) {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                const name = document.getElementById('name').value;
                const head = document.getElementById('head').value;
                const members = document.getElementById('members').value;

                fetch('/api/chulas', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, head, members })
                })
                .then(res => res.json())
                .then(data => {
                    alert(data.message || "Chula added!");
                    form.reset();
                    loadChulas();
                });
            });
        }

        loadChulas();
    </script>
</body>
</html>
