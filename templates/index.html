<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chulas of Poshpora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
        <a class="navbar-brand" href="#">Chulas of Poshpora</a>
        <div class="ms-auto">
            {% if is_admin %}
                <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
            {% else %}
                <a href="/login" class="btn btn-outline-light btn-sm">Admin Login</a>
            {% endif %}
        </div>
    </nav>

    <div class="container mt-4">
        {% if is_admin %}
        <div class="card mb-4">
            <div class="card-header">Add New Chula</div>
            <div class="card-body">
                <form id="chulaForm" class="row g-3">
                    <div class="col-md-4">
                        <input type="text" id="name" class="form-control" placeholder="Chula Name" required>
                    </div>
                    <div class="col-md-4">
                        <input type="text" id="head" class="form-control" placeholder="Chula Head">
                    </div>
                    <div class="col-md-4">
                        <input type="text" id="members" class="form-control" placeholder="Members (comma separated)" required>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">Add Chula</button>
                    </div>
                </form>
            </div>
        </div>
        {% else %}
        <div class="alert alert-info text-center">
            You must <a href="/login" class="alert-link">log in</a> to add chulas.
        </div>
        {% endif %}

        <h3 class="mb-3">All Chulas</h3>
        <div id="chula-list" class="row g-3"></div>
    </div>

    <script>
        // Load and display chulas
        function loadChulas() {
            fetch('/api/chulas')
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('chula-list');
                    container.innerHTML = '';

                    data.forEach(chula => {
                        const div = document.createElement('div');
                        div.className = 'col-md-6';
                        div.innerHTML = `
                            <div class="card">
                                <div class="card-body">
                                    <h5 class="card-title">${chula.name}</h5>
                                    <p class="card-text"><strong>Head:</strong> ${chula.head || 'N/A'}</p>
                                    <p class="card-text"><strong>Members:</strong> ${chula.members.join(', ')}</p>
                                </div>
                            </div>`;
                        container.appendChild(div);
                    });
                });
        }

        // Handle form submission
        const form = document.getElementById('chulaForm');
        if (form) {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                const name = document.getElementById('name').value;
                const head = document.getElementById('head').value;
                const members = document.getElementById('members').value;

                fetch('/api/chulas', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, head, members })
                })
                .then(res => res.json())
                .then(data => {
                    alert(data.message || "Chula added!");
                    form.reset();
                    loadChulas();
                });
            });
        }

        loadChulas();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
