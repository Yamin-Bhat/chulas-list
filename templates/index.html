<!DOCTYPE html>
<html>
<head>
    <title>Poshpora Chulas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Village Chulas</h1>

    <!-- 🔍 Search Bar -->
    <form method="GET" action="{{ url_for('home') }}" class="search-bar">
        <input type="text" name="q" placeholder="Search chula..." value="{{ search_query }}">
        <button type="submit">Search</button>
    </form>

    <ul>
        {% for chula in chulas %}
            <li>
                <a href="{{ url_for('view_chula', chula_id=chula.id) }}">
                    {{ chula.name }}
                </a>

                {% if session.get('admin') %}
                    | <a href="{{ url_for('edit_chula', chula_id=chula.id) }}">✏️ Edit</a>
                {% endif %}
            </li>
        {% else %}
            <li>No chulas found.</li>
        {% endfor %}
    </ul>

    <hr>

    <!-- 👤 Admin Options -->
    {% if session.get('admin') %}
        <p><a href="{{ url_for('admin') }}">➕ Add New Chula</a></p>
        <p><a href="{{ url_for('logout') }}">🔓 Logout</a></p>
    {% else %}
        <p><a href="{{ url_for('login') }}">🔐 Admin Login</a></p>
    {% endif %}
</body>
</html>
