<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login - Chulas of Poshpora</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
  body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    font-family: 'Inter', sans-serif;
  }
  
  .login-card {
    width: 100%;
    max-width: 400px;
    padding: 2.5rem;
    border-radius: 20px;
    background-color: rgba(255, 255, 255, 0.95);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
    transform: translateY(0);
    transition: all 0.3s ease;
  }

  .login-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 25px 50px rgba(0,0,0,0.4);
  }

  .login-header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .login-header h3 {
    color: #1a1a1a;
    font-weight: 600;
    font-size: 1.75rem;
    margin-bottom: 0.5rem;
  }

  .login-header p {
    color: #666;
    font-size: 1rem;
  }

  .form-control {
    padding: 0.75rem 1rem;
    border: 2px solid #e1e1e1;
    border-radius: 10px;
    transition: all 0.3s ease;
  }

  .form-control:focus {
    border-color: #667eea;
    box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
  }

  .form-label {
    font-weight: 500;
    color: #444;
    margin-bottom: 0.5rem;
  }

  .btn-primary {
    background: linear-gradient(45deg, #667eea, #764ba2);
    border: none;
    padding: 0.75rem;
    font-weight: 500;
    border-radius: 10px;
    transition: all 0.3s ease;
  }

  .btn-primary:hover {
    background: linear-gradient(45deg, #5a67d8, #6b46a3);
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
  }

  #errorMsg {
    display: none;
    border-radius: 10px;
    padding: 1rem;
    margin-bottom: 1.5rem;
    border: none;
    background-color: #fee2e2;
    color: #dc2626;
  }

  .text-center a {
    color: #667eea;
    font-weight: 500;
    transition: color 0.3s ease;
  }

  .text-center a:hover {
    color: #764ba2;
  }
</style>
</head>
<body>

  <div class="login-card">
    <div class="login-header">
      <h3>Admin Login</h3>
      <p class="text-muted">Chulas of Poshpora</p>
    </div>

    <div id="errorMsg" class="alert alert-danger"></div>

    <form id="loginForm">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter username" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 mb-3">
        <span id="loginBtnText">Login</span>
        <span id="loginSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
      </button>
    </form>
    
    <p class="text-center text-muted">
      Back to <a href="/" class="text-decoration-none">Home</a>
    </p>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorMsg = document.getElementById("errorMsg");
      const loginBtnText = document.getElementById("loginBtnText");
      const loginSpinner = document.getElementById("loginSpinner");

      // Validation
      if (!username || !password) {
        errorMsg.textContent = "Please enter both username and password";
        errorMsg.style.display = "block";
        return;
      }

      // Show loading state
      loginBtnText.classList.add("d-none");
      loginSpinner.classList.remove("d-none");
      errorMsg.style.display = "none";

      try {
        const response = await fetch("/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          // Success - redirect to home
          window.location.href = "/";
        } else {
          // Error - show message
          errorMsg.textContent = data.error || "Invalid credentials";
          errorMsg.style.display = "block";
        }
      } catch (err) {
        console.error("Login error:", err);
        errorMsg.textContent = "Server error. Please try again.";
        errorMsg.style.display = "block";
      } finally {
        // Reset loading state
        loginBtnText.classList.remove("d-none");
        loginSpinner.classList.add("d-none");
      }
    });

    // Clear error message when user starts typing
    document.getElementById("username").addEventListener("input", function() {
      document.getElementById("errorMsg").style.display = "none";
    });

    document.getElementById("password").addEventListener("input", function() {
      document.getElementById("errorMsg").style.display = "none";
    });
  </script>

</body>
</html>
