<!DOCTYPE html>
<html>
<head>
    <title>Edit Chula - {{ chula.name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>
    <h2>Edit Chula</h2>

    <form method="POST">
        <label for="name">Chula Name:</label><br>
        <input type="text" name="name" value="{{ chula.name }}" required><br><br>

        <label for="head">Chula Head:</label><br>
        <input type="text" name="head" value="{{ chula.head }}"><br><br>

        <label for="members">Family Members (comma-separated):</label><br>
        <textarea name="members" rows="4" cols="50" required>{{ chula.members }}</textarea><br><br>

        <button type="submit">Save Changes</button>
    </form>

    <br>
    <a href="{{ url_for('home') }}">← Back to Chula List</a>
</body>
</html>
